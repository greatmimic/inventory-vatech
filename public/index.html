<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VATECH — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --border:    #2a2f3d;
    --accent:    #00d4ff;
    --accent2:   #ff6b35;
    --success:   #00e676;
    --warn:      #ffb300;
    --danger:    #ff4444;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .live-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .admin-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .admin-btn:hover { border-color: var(--accent); color: var(--accent); }
  .admin-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.08); }

  /* ── MAIN LAYOUT ── */
  main {
    flex: 1;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── SEARCH SECTION ── */
  .search-section { margin-bottom: 32px; }

  .search-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .search-wrap {
    position: relative;
    display: flex;
    gap: 10px;
  }

  #searchInput {
    flex: 1;
    font-family: var(--mono);
    font-size: 16px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--accent); }

  .clear-btn {
    display: none;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
  }
  .clear-btn.visible { display: block; }

  /* ── RESULTS ── */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .results-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .results-list { display: flex; flex-direction: column; gap: 8px; }

  /* ── ITEM CARD ── */
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .item-card:hover { border-color: var(--accent); background: #1d2235; }
  .item-card.selected { border-color: var(--accent); background: #1a2030; }

  .item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .item-sap {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .item-desc {
    font-size: 14px;
    color: var(--text);
    margin-top: 4px;
    line-height: 1.4;
  }

  .item-qty {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .item-qty.ok    { color: var(--success); }
  .item-qty.low   { color: var(--warn); }
  .item-qty.empty { color: var(--danger); }

  .qty-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── DEDUCT PANEL (expands inside card) ── */
  .deduct-panel {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .deduct-panel.open { display: block; }

  .deduct-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .qty-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .qty-btn {
    width: 40px; height: 44px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-btn:hover { background: var(--border); }

  .qty-number {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    width: 56px;
    text-align: center;
    background: none;
    border: none;
    color: var(--text);
    outline: none;
    -moz-appearance: textfield;
  }
  .qty-number::-webkit-outer-spin-button,
  .qty-number::-webkit-inner-spin-button { -webkit-appearance: none; }

  .confirm-btn {
    flex: 1;
    min-width: 140px;
    height: 44px;
    background: var(--accent);
    color: #0f1117;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .confirm-btn:hover   { opacity: 0.85; }
  .confirm-btn:active  { transform: scale(0.98); }
  .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 24px;
    font-family: var(--mono);
    font-size: 13px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error   { border-color: var(--danger);  color: var(--danger);  }

  /* ── ADMIN PANEL ── */
  #adminPanel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 32px;
  }
  #adminPanel.open { display: block; }

  .admin-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .admin-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }

  .tab-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.08); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .form-group { margin-bottom: 14px; }

  .form-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent2); }

  .admin-submit {
    width: 100%;
    height: 44px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .admin-submit:hover { opacity: 0.85; }

  /* ── STOCK LIST ── */
  .stock-list-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .stock-filter {
    flex: 1;
    min-width: 160px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  .stock-filter:focus { border-color: var(--accent2); }

  .stock-filter-select {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .stock-filter-select:focus { border-color: var(--accent2); }

  .stock-summary {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    padding: 4px 0;
    width: 100%;
  }

  .stock-table-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    max-height: 420px;
    overflow-y: auto;
  }

  .stock-table-wrap::-webkit-scrollbar { width: 6px; }
  .stock-table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .stock-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .stock-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .stock-table thead {
    position: sticky;
    top: 0;
    z-index: 2;
    background: #1e2333;
  }

  .stock-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .stock-table th:hover { color: var(--accent2); }
  .stock-table th.sorted { color: var(--accent2); }
  .sort-arrow { margin-left: 4px; opacity: 0.6; }

  .stock-table td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(42,47,61,0.6);
    vertical-align: middle;
  }

  .stock-table tr:last-child td { border-bottom: none; }
  .stock-table tr:hover td { background: rgba(255,107,53,0.04); }

  .stock-table .td-sap {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }

  .stock-table .td-desc {
    color: var(--text);
    max-width: 340px;
  }

  .stock-table .td-qty {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }
  .stock-table .td-qty.ok    { color: var(--success); }
  .stock-table .td-qty.low   { color: var(--warn); }
  .stock-table .td-qty.empty { color: var(--danger); }

  .stock-loading {
    text-align: center;
    padding: 32px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── STOCK LIST ── */
  .stock-list-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stock-filter {
    flex: 1;
    min-width: 160px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  .stock-filter:focus { border-color: var(--accent2); }
  .stock-filter-select {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    outline: none;
    cursor: pointer;
  }
  .stock-summary {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .stock-table-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    max-height: 400px;
    overflow-y: auto;
  }
  .stock-table-wrap::-webkit-scrollbar { width: 6px; }
  .stock-table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .stock-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .stock-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .stock-table thead { position: sticky; top: 0; z-index: 2; background: #1e2333; }
  .stock-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .stock-table th:hover { color: var(--accent2); }
  .stock-table th.sorted { color: var(--accent2); }
  .sort-arrow { margin-left: 4px; opacity: 0.5; }
  .stock-table td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(42,47,61,0.6);
    vertical-align: middle;
  }
  .stock-table tr:last-child td { border-bottom: none; }
  .stock-table tr:hover td { background: rgba(255,107,53,0.04); }
  .td-sap { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; }
  .td-desc { color: var(--text); }
  .td-qty { font-family: var(--mono); font-size: 13px; font-weight: 600; text-align: right; white-space: nowrap; }
  .td-qty.ok    { color: var(--success); }
  .td-qty.low   { color: var(--warn); }
  .td-qty.empty { color: var(--danger); }
  .stock-loading { text-align: center; padding: 32px; font-family: var(--mono); font-size: 12px; color: var(--muted); }

  @media (max-width: 520px) {
    .stock-table thead { display: none; }
    .stock-table, .stock-table tbody, .stock-table tr { display: block; width: 100%; }
    .stock-table td { display: inline; border: none; padding: 0; }
    .stock-table tr {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(42,47,61,0.8);
    }
    .stock-table tr:hover { background: rgba(255,107,53,0.04); }
    .td-sap {
      display: inline !important;
      font-size: 12px;
    }
    .td-qty {
      display: inline !important;
      font-size: 12px;
      text-align: left;
    }
    .td-qty::before { content: ' ('; color: var(--muted); }
    .td-qty::after  { content: ')'; color: var(--muted); }
    .td-desc {
      display: block !important;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-family: var(--mono); font-size: 13px; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    main { padding: 20px 16px; }
    .item-desc { font-size: 13px; }
    .deduct-row { flex-direction: column; }
    .confirm-btn { width: 100%; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">VATECH <span>/ INVENTORY</span></div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-label">LIVE</span>
    <button class="admin-btn" id="adminToggle" onclick="toggleAdmin()">ADMIN</button>
  </div>
</header>

<main>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <div class="admin-title">⬡ Admin Panel</div>
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('add-stock')">Add Stock</button>
      <button class="tab-btn" onclick="switchTab('deduct')">Deduct</button>
      <button class="tab-btn" onclick="switchTab('new-item')">New Item</button>
      <button class="tab-btn" onclick="switchTab('stock-list')">Stock List</button>
    </div>

    <!-- Tab: Add Stock -->
    <div class="tab-content active" id="tab-add-stock">
      <div class="form-group">
        <label class="form-label">SAP Code</label>
        <input class="form-input" id="adminCode" type="text" placeholder="e.g. A0000236" autocomplete="off" autocapitalize="characters">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity to Add</label>
        <input class="form-input" id="adminQty" type="number" min="1" placeholder="e.g. 10">
      </div>
      <button class="admin-submit" onclick="adminAddStock()">+ ADD TO STOCK</button>
    </div>

    <!-- Tab: New Item -->
    <div class="tab-content" id="tab-new-item">
      <div class="form-group">
        <label class="form-label">SAP Code</label>
        <input class="form-input" id="newCode" type="text" placeholder="e.g. A0099999" autocapitalize="characters">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="newDesc" type="text" placeholder="Part description">
      </div>
      <div class="form-group">
        <label class="form-label">Initial Quantity</label>
        <input class="form-input" id="newQty" type="number" min="0" placeholder="0">
      </div>
      <button class="admin-submit" onclick="adminNewItem()">CREATE ITEM</button>
    </div>

    <!-- Tab: Deduct (Admin) -->
    <div class="tab-content" id="tab-deduct">
      <div class="form-group">
        <label class="form-label">SAP Code</label>
        <input class="form-input" id="adminDeductCode" type="text" placeholder="e.g. A0000236" autocomplete="off" autocapitalize="characters">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity to Deduct</label>
        <input class="form-input" id="adminDeductQty" type="number" min="1" placeholder="e.g. 5">
      </div>
      <button class="admin-submit" style="background:var(--danger)" onclick="adminDeduct()">− DEDUCT FROM STOCK</button>
    </div>

    <!-- Tab: Stock List -->
    <div class="tab-content" id="tab-stock-list">
      <div class="stock-list-controls">
        <input class="stock-filter" id="stockFilter" type="text" placeholder="Filter by SAP code or description..." oninput="renderStockTable()">
        <select class="stock-filter-select" id="stockFilterStatus" onchange="renderStockTable()">
          <option value="all">All items</option>
          <option value="ok">In stock</option>
          <option value="low">Low (≤3)</option>
          <option value="empty">Out of stock</option>
        </select>
      </div>
      <div class="stock-summary" id="stockSummary"></div>
      <div class="stock-table-wrap">
        <div class="stock-loading" id="stockLoading">Loading inventory...</div>
        <table class="stock-table" id="stockTable" style="display:none">
          <thead>
            <tr>
              <th onclick="sortStock('sap_code')">SAP Code <span class="sort-arrow" id="sort-sap_code">↕</span></th>
              <th onclick="sortStock('quantity')">Qty <span class="sort-arrow" id="sort-quantity">↕</span></th>
              <th onclick="sortStock('description')">Description <span class="sort-arrow" id="sort-description">↕</span></th>
            </tr>
          </thead>
          <tbody id="stockTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <span class="search-label">Search by SAP Code or Description</span>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Type SAP code or part name..."
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onSearch()" inputmode="search">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">×</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

  <!-- EMPTY STATE (default) -->
  <div class="empty-state" id="emptyState">
    <div class="icon">⌕</div>
    <p>Enter a SAP code or part name to search inventory</p>
  </div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
// When deployed: set this to your Render backend URL
// e.g. const API = 'https://your-app.onrender.com';
const API = '';   // empty = same origin (works when served by Node.js)

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedCard = null;
let searchTimeout = null;

// ── SEARCH ───────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').classList.toggle('visible', q.length > 0);

  clearTimeout(searchTimeout);
  if (!q) {
    hideResults();
    return;
  }
  searchTimeout = setTimeout(() => fetchItems(q), 180);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  hideResults();
  document.getElementById('searchInput').focus();
}

function hideResults() {
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  selectedCard = null;
}

async function fetchItems(q) {
  try {
    const res  = await fetch(`${API}/api/items?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderResults(data, q);
  } catch (e) {
    showToast('Connection error', 'error');
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderResults(items, q) {
  const section = document.getElementById('resultsSection');
  const list    = document.getElementById('resultsList');
  const count   = document.getElementById('resultsCount');
  const empty   = document.getElementById('emptyState');

  section.style.display = 'block';
  empty.style.display   = 'none';
  count.textContent     = `${items.length} result${items.length !== 1 ? 's' : ''}`;

  list.innerHTML = '';

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state" style="padding:40px 20px">
      <div class="icon">✕</div>
      <p>No items found for "${q}"</p>
    </div>`;
    return;
  }

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.code = item.sap_code;

    const qtyClass = item.quantity === 0 ? 'empty' : item.quantity <= 3 ? 'low' : 'ok';

    card.innerHTML = `
      <div class="item-top">
        <div>
          <div class="item-sap">${highlight(item.sap_code, q)}</div>
          <div class="item-desc">${highlight(item.description, q)}</div>
        </div>
        <div style="text-align:right">
          <div class="item-qty ${qtyClass}">${item.quantity}</div>
          <div class="qty-label">IN STOCK</div>
        </div>
      </div>
      <div class="deduct-panel" id="panel-${item.sap_code}">
        <div class="deduct-row">
          <div class="qty-input-wrap">
            <button class="qty-btn" onclick="changeQty('${item.sap_code}', -1, event)">−</button>
            <input class="qty-number" id="qty-${item.sap_code}" type="number" value="1" min="1" max="${item.quantity}">
            <button class="qty-btn" onclick="changeQty('${item.sap_code}', 1, event)">+</button>
          </div>
          <button class="confirm-btn" onclick="confirmDeduct('${item.sap_code}', event)"
            ${item.quantity === 0 ? 'disabled' : ''}>
            ${item.quantity === 0 ? 'OUT OF STOCK' : 'CONFIRM USE'}
          </button>
        </div>
      </div>
    `;

    card.addEventListener('click', () => toggleCard(item.sap_code, card));
    list.appendChild(card);
  });
}

function highlight(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'),
    '<mark style="background:rgba(0,212,255,0.2);color:var(--accent);border-radius:2px">$1</mark>');
}

// ── CARD INTERACTION ─────────────────────────────────────────────────────────
function toggleCard(code, card) {
  const panel = document.getElementById(`panel-${code}`);

  if (selectedCard && selectedCard !== code) {
    // Close previous
    const prevCard  = document.querySelector(`.item-card[data-code="${selectedCard}"]`);
    const prevPanel = document.getElementById(`panel-${selectedCard}`);
    if (prevCard)  prevCard.classList.remove('selected');
    if (prevPanel) prevPanel.classList.remove('open');
  }

  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('selected', !isOpen);
  selectedCard = isOpen ? null : code;
}

function changeQty(code, delta, e) {
  e.stopPropagation();
  const input = document.getElementById(`qty-${code}`);
  const max   = parseInt(input.max) || 9999;
  let val = parseInt(input.value) || 1;
  val = Math.min(max, Math.max(1, val + delta));
  input.value = val;
}

// ── DEDUCT ───────────────────────────────────────────────────────────────────
async function confirmDeduct(code, e) {
  e.stopPropagation();
  const input = document.getElementById(`qty-${code}`);
  const qty   = parseInt(input.value) || 1;
  const btn   = e.target;

  btn.disabled = true;
  btn.textContent = 'PROCESSING...';

  try {
    const res  = await fetch(`${API}/api/items/${code}/deduct`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ quantity: qty })
    });
    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || 'Error', 'error');
      btn.disabled    = false;
      btn.textContent = 'CONFIRM USE';
      return;
    }

    showToast(`✓ Deducted ${qty}× ${code}`, 'success');

    // Refresh search to show updated qty
    const q = document.getElementById('searchInput').value.trim();
    await fetchItems(q);

  } catch (err) {
    showToast('Connection error', 'error');
    btn.disabled    = false;
    btn.textContent = 'CONFIRM USE';
  }
}

// ── ADMIN ────────────────────────────────────────────────────────────────────
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  const btn   = document.getElementById('adminToggle');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('active', open);
}

function switchTab(tabId) {
  const tabIds = ['add-stock', 'deduct', 'new-item', 'stock-list'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', tabIds[i] === tabId);
  });
  document.querySelectorAll('.tab-content').forEach(t => {
    t.classList.toggle('active', t.id === `tab-${tabId}`);
  });
  if (tabId === 'stock-list') loadStockList();
}

// ── ADMIN DEDUCT ──────────────────────────────────────────────────────────────
async function adminDeduct() {
  const code = document.getElementById('adminDeductCode').value.trim().toUpperCase();
  const qty  = parseInt(document.getElementById('adminDeductQty').value);
  if (!code || !qty || qty <= 0) { showToast('Enter SAP code and quantity', 'error'); return; }
  try {
    const res  = await fetch(`${API}/api/items/${code}/deduct`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ quantity: qty })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Error', 'error'); return; }
    showToast(`✓ Deducted ${qty} from ${code} — now ${data.item.quantity} in stock`, 'success');
    document.getElementById('adminDeductCode').value = '';
    document.getElementById('adminDeductQty').value  = '';
    const q = document.getElementById('searchInput').value.trim();
    if (q) fetchItems(q);
  } catch { showToast('Connection error', 'error'); }
}

// ── STOCK LIST ────────────────────────────────────────────────────────────────
let allStock     = [];
let stockSortKey = 'sap_code';
let stockSortAsc = true;

async function loadStockList() {
  const loading = document.getElementById('stockLoading');
  const table   = document.getElementById('stockTable');
  loading.style.display = 'block';
  table.style.display   = 'none';
  try {
    const res  = await fetch(`${API}/api/items`);
    allStock   = await res.json();
    loading.style.display = 'none';
    table.style.display   = 'table';
    renderStockTable();
  } catch {
    loading.textContent = 'Failed to load inventory.';
  }
}

function renderStockTable() {
  const filterText   = (document.getElementById('stockFilter').value || '').toLowerCase();
  const filterStatus = document.getElementById('stockFilterStatus').value;

  let items = allStock.filter(item => {
    const matchText = !filterText ||
      item.sap_code.toLowerCase().includes(filterText) ||
      item.description.toLowerCase().includes(filterText);
    const matchStatus =
      filterStatus === 'all'   ? true :
      filterStatus === 'ok'    ? item.quantity > 3 :
      filterStatus === 'low'   ? (item.quantity > 0 && item.quantity <= 3) :
      filterStatus === 'empty' ? item.quantity === 0 : true;
    return matchText && matchStatus;
  });

  // Sort
  items.sort((a, b) => {
    let va = a[stockSortKey], vb = b[stockSortKey];
    if (stockSortKey === 'quantity') { va = Number(va); vb = Number(vb); }
    else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    if (va < vb) return stockSortAsc ? -1 :  1;
    if (va > vb) return stockSortAsc ?  1 : -1;
    return 0;
  });

  // Update sort arrows
  ['sap_code','description','quantity'].forEach(k => {
    const el = document.getElementById(`sort-${k}`);
    if (el) el.textContent = k === stockSortKey ? (stockSortAsc ? '↑' : '↓') : '↕';
    const th = el ? el.parentElement : null;
    if (th) th.classList.toggle('sorted', k === stockSortKey);
  });

  // Summary
  const total  = allStock.length;
  const empty  = allStock.filter(i => i.quantity === 0).length;
  const low    = allStock.filter(i => i.quantity > 0 && i.quantity <= 3).length;
  document.getElementById('stockSummary').textContent =
    `${items.length} of ${total} items shown  ·  ${empty} out of stock  ·  ${low} low stock`;

  // Rows
  const tbody = document.getElementById('stockTableBody');
  tbody.innerHTML = '';
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--muted);font-family:var(--mono);font-size:12px">No items match filter</td></tr>`;
    return;
  }
  items.forEach(item => {
    const qc = item.quantity === 0 ? 'empty' : item.quantity <= 3 ? 'low' : 'ok';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-sap">${item.sap_code}</td>
      <td class="td-qty ${qc}">${item.quantity}</td>
      <td class="td-desc">${item.description}</td>`;
    tbody.appendChild(tr);
  });
}

function sortStock(key) {
  if (stockSortKey === key) stockSortAsc = !stockSortAsc;
  else { stockSortKey = key; stockSortAsc = true; }
  renderStockTable();
}

async function adminAddStock() {
  const code = document.getElementById('adminCode').value.trim().toUpperCase();
  const qty  = parseInt(document.getElementById('adminQty').value);

  if (!code || !qty || qty <= 0) { showToast('Enter SAP code and quantity', 'error'); return; }

  try {
    const res  = await fetch(`${API}/api/items/${code}/add`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ quantity: qty })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Error', 'error'); return; }
    showToast(`✓ Added ${qty} to ${code} — now ${data.item.quantity} in stock`, 'success');
    document.getElementById('adminCode').value = '';
    document.getElementById('adminQty').value  = '';
    const q = document.getElementById('searchInput').value.trim();
    if (q) fetchItems(q);
  } catch { showToast('Connection error', 'error'); }
}

async function adminNewItem() {
  const code = document.getElementById('newCode').value.trim().toUpperCase();
  const desc = document.getElementById('newDesc').value.trim();
  const qty  = parseInt(document.getElementById('newQty').value) || 0;

  if (!code || !desc) { showToast('SAP code and description required', 'error'); return; }

  try {
    const res  = await fetch(`${API}/api/items`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ sap_code: code, description: desc, quantity: qty })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Error', 'error'); return; }
    showToast(`✓ Created ${code}`, 'success');
    document.getElementById('newCode').value = '';
    document.getElementById('newDesc').value = '';
    document.getElementById('newQty').value  = '';
  } catch { showToast('Connection error', 'error'); }
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── KEYBOARD SHORTCUT ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
  if ((e.key === 'f' || e.key === '/') && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});
</script>
</body>
</html>
